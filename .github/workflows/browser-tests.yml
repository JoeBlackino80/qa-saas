name: Browser tests

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {} # manual run from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    # Official Playwright image: browsers + system deps preinstalled (avoids
    # flaky "playwright install --with-deps" failures on the bare runner).
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: npm install @supabase/supabase-js playwright@1.48.0
      - name: Run browser tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          node scripts/run-browser-tests.mjs 2>&1 | tee /tmp/out.txt
          code=${PIPESTATUS[0]}
          {
            echo '### Browser tests výstup';
            echo '```';
            cat /tmp/out.txt;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code
